appId: fr.karamon.launcher
productName: Karamon Launcher

publish:
  provider: github
  owner: realKarasu
  repo: Launcher-Karamon

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true

files:
  - "dist/**/*"
  - "assets/**/*"
  - "node_modules/**/*"
  - "!node_modules/.cache/**"
  - "!**/*.java"
  - "!.claude/**"

extraResources:
  - from: assets/
    to: assets/
    filter: ["**/*"]
