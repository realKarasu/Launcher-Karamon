appId: fr.karamon.launcher
productName: Karamon Launcher

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  signingHashAlgorithms: []
  sign: null

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true

files:
  - "main.mjs"
  - "preload.cjs"
  - "src/**/*"
  - "core/**/*"
  - "assets/**/*"
  - "node_modules/**/*"
  - "!node_modules/.cache/**"
  - "!**/*.java"
  - "!*.bat"
  - "!scripts/**"
  - "!build/**"
  - "!dist/**"
  - "!.claude/**"

extraResources:
  - from: assets/
    to: assets/
    filter: ["**/*"]
