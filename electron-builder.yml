appId: fr.karamon.launcher
productName: Karamon Launcher

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: always
  createStartMenuShortcut: true

files:
  - "**/*"
  - "!src/main/**"
  - "!build/**"
  - "!scripts/**"
  - "!*.bat"
  - "!**/*.java"
  - "!node_modules/.cache/**"

extraResources:
  - from: assets/
    to: assets/
    filter: ["**/*"]
